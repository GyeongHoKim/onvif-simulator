name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    name: Release CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .go-version
          cache: true

      - uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: v2.15.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gui-windows:
    name: Release GUI (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: internal/gui/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Make
        shell: powershell
        run: choco install make --yes --no-progress

      - name: Install NSIS
        shell: powershell
        run: choco install nsis --yes --no-progress

      - name: Add NSIS to PATH
        shell: bash
        run: echo "C:/Program Files (x86)/NSIS" >> "$GITHUB_PATH"

      - name: Build GUI (NSIS installer)
        shell: bash
        run: make gui-windows

      - name: Upload to Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: build/bin/onvif-simulator-gui-amd64-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gui-macos:
    name: Release GUI (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: internal/gui/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build GUI (.app)
        run: make gui-darwin

      - name: Package as .dmg
        run: |
          hdiutil create -volname "onvif-simulator" \
            -srcfolder build/bin/onvif-simulator.app \
            -ov -format UDZO \
            onvif-simulator-gui-darwin-amd64.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: onvif-simulator-gui-darwin-amd64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gui-linux:
    name: Release GUI (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: internal/gui/frontend/package-lock.json

      - name: Install system dependencies
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install AppImage tool
        run: |
          curl -fsSL -o appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract
          mv squashfs-root appimagetool-extracted
          ln -s appimagetool-extracted/AppRun appimagetool

      - name: Build GUI
        run: make gui-linux

      - name: Package as AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp build/bin/onvif-simulator-gui AppDir/usr/bin/
          cp build/appicon.png AppDir/onvif-simulator-gui.png
          cat > AppDir/onvif-simulator-gui.desktop <<EOF
          [Desktop Entry]
          Name=onvif-simulator
          Exec=onvif-simulator-gui
          Icon=onvif-simulator-gui
          Type=Application
          Categories=Utility;
          EOF
          ARCH=x86_64 ./appimagetool AppDir onvif-simulator-gui-linux-amd64.AppImage

      - name: Upload to Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: onvif-simulator-gui-linux-amd64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
