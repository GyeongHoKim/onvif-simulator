name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    name: Release CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: mise.toml
          cache: true

      - uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: v2.15.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gui:
    name: Release GUI (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            output: onvif-simulator-gui
            archive_cmd: tar -czf onvif-simulator-gui_linux_amd64.tar.gz onvif-simulator-gui
            asset: onvif-simulator-gui_linux_amd64.tar.gz
          - os: macos
            runner: macos-latest
            output: onvif-simulator-gui
            archive_cmd: tar -czf onvif-simulator-gui_darwin_amd64.tar.gz onvif-simulator-gui.app
            asset: onvif-simulator-gui_darwin_amd64.tar.gz
          - os: windows
            runner: windows-latest
            output: onvif-simulator-gui.exe
            archive_cmd: Compress-Archive -Path onvif-simulator-gui.exe -DestinationPath onvif-simulator-gui_windows_amd64.zip
            asset: onvif-simulator-gui_windows_amd64.zip

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: mise.toml
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: mise.toml
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build GUI
        working-directory: cmd/gui
        run: wails build -o ../../${{ matrix.output }}

      - name: Archive (Unix)
        if: matrix.os != 'windows'
        run: ${{ matrix.archive_cmd }}

      - name: Archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: ${{ matrix.archive_cmd }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ${{ matrix.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
