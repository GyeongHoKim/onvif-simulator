version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - cyclop
    - dogsled
    - dupl
    - durationcheck
    - err113
    - errcheck
    - errchkjson
    - errorlint
    - exhaustive
    - fatcontext
    - funlen
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - godox
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - intrange
    - lll
    - loggercheck
    - makezero
    - mirror
    - misspell
    - mnd
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace

  settings:
    cyclop:
      max-complexity: 15

    dupl:
      threshold: 100

    err113:
      check-type-assertions: true

    errcheck:
      check-type-assertions: true
      check-blank: true

    errorlint:
      asserts: true

    exhaustive:
      default-signifies-exhaustive: true

    funlen:
      lines: -1
      statements: 50

    goconst:
      min-len: 2
      min-occurrences: 3

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint

    gocyclo:
      min-complexity: 15

    godox:
      keywords:
        - TODO
        - FIXME
        - HACK

    govet:
      enable:
        - nilness
        - shadow

    lll:
      line-length: 120

    misspell:
      locale: US

    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"

    nakedret:
      max-func-lines: 0

    nestif:
      min-complexity: 5

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: indent-error-flow
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
          disabled: true
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unused-receiver
        - name: unreachable-code
        - name: redefines-builtin-id

    staticcheck:
      checks:
        - "all"
        - "-SA1019"  # deprecated: handled individually

  exclusions:
    rules:
      - path: (.+)_test\.go
        linters:
          - dupl
          - mnd
          - lll
          - funlen
          - goconst
          - gosec
      - path: (.+)_test\.go
        linters:
          - gochecknoinits
        text: "init function"

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
    goimports:
      local-prefixes:
        - github.com/GyeongHoKim/onvif-simulator

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
